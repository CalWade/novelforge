# Genre: gangster-hk-1983
# 港综同人 · 1983 —— 题材级元信息与写作指导
# 所有使用此题材的 project（作品）共享这份文件

id: gangster-hk-1983
display_name: 港综同人 · 1983
subtitle: 一个福建仔、一张情报表、一座永远在涨潮的城市
locale: zh-Hans

genre: 港综同人（都市犯罪 + 市井江湖 + 金融操盘）
era: 1983-2000 香港
tone: 暴力美学 + 克制算计 + 市井温度

# 题材级别的"作者画像"—— Generator 的 system prompt 会加载
author_persona_hints:
  - 专精 1980s 港片和港综题材
  - 熟悉粤语俚语（咪郁、扑街、靓仔、睇场、大佬）
  - 克制、冷笔，不抒情，不煽情
  - 场景感强，具体到物价、街道、饮食

# 题材级回避清单（所有写港综的作品都要遵守）
genre_avoid:
  - 跪舔洋人的叙事（外方角色是被利用的对象，不是救世主）
  - 真名直用真实历史人物（必须代指化：霍英东 → 霍官泰；李嘉诚 → 李超人；邵逸夫 → 邵老板）
  - 玄幻超能力（金手指应设计为"查询/信息"而非"物理输出"）
  - 圣母 / 降智 / 双标

# 风格锁定 prohibited_styles —— Generator/Fixer 每章顶部加载
# 来源：skill #24 全局风格锁定。长链路写作最易飘，必须显式禁止跨题材串味
prohibited_styles:
  # 通用禁止（所有 genre 共用）
  - 影视剧本腔（"镜头推进"/"特写"/"切"等镜头语言，正文不是分镜）
  - 游戏系统播报腔（"恭喜获得"/"经验+100"/"任务完成"等 UI 式提示，除非系统就是设定内机制）
  - 轻小说吐槽腔（"我说你啊……"+"吐槽"连环，每段都在自言自语解读场景）
  - 散文抒情腔（大段环境白描无冲突推进，把正文写成风景文）
  - 玩梗吐槽（网络热梗穿越到 1983 香港）
  # 题材特定禁止
  - 玄幻修仙腔（飞剑、灵气、修为、丹田等修仙词汇）
  - 星际科幻腔（星舰、曲率、跃迁、量子等科幻硬词）
  - 宫斗古风腔（此事另有隐情、圣上、万岁、娘娘等古装词）
  - 都市甜宠腔（霸总、小甜饼、嘟嘴、撒娇等偶像剧桥段）
