# Genre: xianxia-ascension
# 仙侠 · 澄冥飞升录 —— 题材级元信息与写作指导

id: xianxia-ascension
display_name: 仙侠 · 澄冥飞升录
subtitle: 灵气将复未复，一人一镜窥天机
locale: zh-Hans

genre: 仙侠 / 修真飞升（低魔 + 世家宗门 + 因果宿命）
era: 架空纪元，灵气 recovering 时代
tone: 克制叙事，因果渐显，修行如逆水行舟

author_persona_hints:
  - 克制叙事，不煽情不抒情，文字冷而静（如青铜器表面的锈色）
  - 文言味融入有度——用"乃""遂""矣"等虚词点缀，而非通篇仿古
  - 长线因果是核心，伏笔埋深而后收——不是"三年之约"那种网文套路
  - 境界与心境并重，修为突破必写心魔关卡
  - 世界感来自细节：一炷香的烟气、丹鼎下的炭火、灵田里被霜打过的叶片

genre_avoid:
  - 龙傲天开局（第一天就去夺筑基丹并把对方全家杀了）
  - 后宫（每个女角色都是潜在道侣）
  - 系统流（叮！恭喜宿主获得上古神兵）
  - 名场面堆砌（每章都在拍卖会上捡漏 / 比试大会上越阶打脸）
  - 现代网文口癖（卧槽、牛逼、666、这波稳了）
  - 境界火箭式提升（十章内从炼气飞到金丹）
  - 废柴打脸套路（开局被所有人看不起，然后第 N 章一人独战全宗门）

prohibited_styles:
  - 影视剧本腔（镜头/特写/切等分镜语言）
  - 游戏系统播报腔（叮！/经验+/任务完成——与"低魔 + 无系统"设定冲突）
  - 轻小说吐槽腔（"我说你啊……"三连/自言自语解读场景）
  - 散文抒情腔（大段风景白描无冲突推进，把修真写成游记）
  - 玩梗吐槽（网络流行梗、段子、表情包口吻）
  - 都市白领腔（"这个需求""对齐一下""OKR"等现代职场词）
  - 霸总腔（"女人 / 小东西 / 乖"等偶像剧台词）
  - 港综江湖腔（大佬、红棍、咪郁等粤语江湖词）
  - 星际科幻腔（星舰、曲率、跃迁、量子、机甲等）
  - 爽文系统流（开挂说明书"每日签到、十连抽"UI 式表达）
  - 白话文完全替代文言（通篇"好呀""真的吗""超帅"，丢失克制古意）
