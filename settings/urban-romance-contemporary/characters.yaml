protagonist:
  id: shen_ruowei
  name: 沈若微
  gender: 女
  age: 30
  origin: 湖北武汉，华科计算机本科毕业，来深六年
  occupation: 产品经理（现司·深圳研发中心），七年产品经验，从执行PM做到高级产品经理
  appearance: 约165cm，偏瘦，短发齐肩（方便，不用每天打理），日常戴一副金属细框眼镜，不化妆时显得年纪比实际小但眼神不年轻
  traits:
    - 对"对不对"的执念超过"老板怎么看"
    - 能忍但不是没脾气——忍是为了算清楚再出手
    - 不习惯求助，六年来所有职业困境都自己扛过去
    - 做选择慢但一旦做了就不回头
    - 擅长在会议上用数据和逻辑让对方闭嘴
  redlines:
    - 不允许任何人替她做人生决定
    - 不拿感情当交易的筹码
    - 不因恐惧做选择——可以因为不确定而等，但不能因为害怕而跑
  contradictions:
    - 工作日冷静理性，周末会在出租屋里看一整天的老电影
    - 不擅长撒娇但会在深夜给大学室友发很长的语音
    - 对数据极度敏锐但对人际关系经常慢半拍——事后才明白对方那句话的意思
  catchphrase:
    - 先做，再聊
    - 这个问题没有标准答案
  system: null
supporting:
  - id: lin_zhaoyu
    name: 林昭宇
    role: 创业合伙人 / 感情线的另一方
    gender: 男
    age: 32
    origin: 广东潮汕，中山大学计算机系，前腾云高级工程师
    occupation: 创业者——AI客服方向，刚拿到天使轮
    appearance: 约178cm，偏瘦，常年穿公司文化衫+牛仔裤，左手臂有一道高中打篮球留下的旧疤
    traits:
      - 表面散漫实则极其认真——会为了一行代码的逻辑在凌晨三点给你发消息
      - 不擅长表达但擅长"做"——他记你说过的话比你自己记得还清楚
      - 创业是他的执念——不是想发财，是想证明一件事他可以从头做到尾
    weakness: 过于信任数据和逻辑——当数据和直觉冲突时会痛苦
    motivation: 做出一个真正有用的产品，不卖给大厂，自己养大
    narrative_note: 不是"男主角"，是一个完整的人。他和沈若微的关系是以"选择"而非"互动"来写的——两个人都在选，都在犹豫，都在算代价
  - id: gu_anan
    name: 顾安安
    role: 大学室友 / 对照镜
    gender: 女
    age: 30
    origin: 上海本地人，复旦金融系，毕业后入投行，六年做到VP
    occupation: 投行VP（上海），专做TMT赛道
    appearance: 约162cm，精致但不高冷——她可以在五星级酒店穿高跟鞋，也可以在陆家嘴楼下便利店蹲着吃关东煮
    traits:
      - 看起来什么都能搞定，实际上也会半夜给沈若微打电话说"我不知道怎么办"
      - 是最早结婚的那批人——不是因为她传统，是因为她遇到了想要定下来的人
      - 说话不绕弯，是沈若微唯一敢在她面前示弱的人
    weakness: 习惯用"搞定"的思维解决问题——遇到不能"搞定"的事（怀孕后的不确定性）会慌乱
    motivation: 在三十岁这个节点，找到一个比工作更让她有安全感的东西
  - id: zhao_kai
    name: 赵恺
    role: 研发负责人 / 对手变同道
    gender: 男
    age: 33
    origin: 辽宁沈阳，哈工大软件工程，在深圳工作八年
    occupation: 资深研发工程师 → 离职去杭州（阿里云）
    appearance: 约182cm，微胖（加班型肥胖），常年黑框眼镜，工位上堆满了空咖啡罐
    traits:
      - 嘴硬心软——评审会上能怼人，但私下会帮人改接口
      - 技术过硬但不擅向上管理——升不上去不是因为能力不够
      - 对沈若微的态度从"这PM不懂技术"变成"这PM比大部分研发更清楚自己在做什么"
    weakness: 太直——在公司政治里吃亏
    motivation: 离开深圳去杭州，是因为想在一个不会因为"会不会做人"而卡住的地方写代码
    loyalty_source: 被沈若微的专业能力说服——她是他遇到的第一个不甩锅的产品经理
  - id: ji_lin
    name: 季凛
    role: 北京产品线VP / 事业线的"明牌"
    gender: 男
    age: 42
    origin: 北京，北大计算机系，在现司十一年，从PM做到VP
    occupation: 现司北京总部产品线VP
    appearance: 约175cm，偏瘦，头发有白，说话语速慢但每个字都精确。穿Polo衫比西装更多——不是不讲究，是不需要用西装证明什么
    traits:
      - 看人极准——他能在三十分钟面试里判断一个人能不能独当一面
      - 说话滴水不漏，从不给承诺但每次给的选择都是精心计算的
      - 不强压——他会给你布好两条路，然后看你选哪条
    weakness: 情感隔离——把所有人的关系都换算成"能力×信任×利益"的公式
    motivation: 在退休前留下一条最强的产品线——不是为自己，是为证明他的方法论是对的
    narrative_note: 不是反派。是一个让沈若微看到"如果继续走这条路会变成什么样"的人——令人敬佩但未必令人羡慕
  - id: shen_mu
    name: 沈母（李秀兰）
    role: 家庭线的声音
    gender: 女
    age: 58
    origin: 湖北武汉，退休中学教师
    occupation: 退休
    appearance: 普通武汉阿姨，说话中气足，炒菜偏咸，微信头像是自家窗台上的花
    traits:
      - 关心但不逼迫——她会说"你三十了"然后停住，因为她知道再说下去会吵架
      - 对独生女的婚恋有期待——不是传统意义上的催婚，是真的怕她一个人太累
      - 和沈若微的通话永远是三句话内就挂——不是因为母女关系差，是因为两个人都不擅长表达
    weakness: 不知道女儿到底在做什么工作——只知道"在深圳做互联网"
    motivation: 在女儿三十岁这一年，搞清楚她到底开心不开心——不是为了催婚，是为了确认她没事
