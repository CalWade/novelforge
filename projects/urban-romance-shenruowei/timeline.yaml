# 都市言情时间线 (Urban Romance Contemporary Timeline)
# 以 2024 年 10 月为故事开始的锚点

'2024':
  - date: 2024-09
    event: iPhone 16 发布，科技园里换新机的人排成长队。大模型创业潮进入白热化，科兴科学园每周都有新的AI路演
  - date: 2024-10
    event: 第一章：沈若微在需求评审会上与研发负责人交锋；傍晚在万象天地偶遇前同事林昭宇——他创业了，想挖她过去
  - date: 2024-11
    event: 第二章：Q4冲刺，双十一大促季。沈若微连续加班。好友顾安安（投行VP）从上海来深圳出差，递来婚礼请柬
  - date: 2024-12
    event: 第三章：沈若微收到北京总部内部转岗面试邀请。同月，林昭宇的创业公司拿到天使轮。职业岔路口

'2025':
  - date: 2025-01
    event: 第四章：元旦回武汉。母亲安排相亲。返深后参加顾安安婚礼——做伴娘
  - date: 2025-03
    event: 第五章：沈若微做了第三选择——不选北京也不选林昭宇，拆成两个"试"。第一次对"明牌"说不
  - date: 2025-05
    event: 第六章：创业产品上线数据不及预期。赵恺离职去杭州，临走说了一段让沈若微沉默的话
  - date: 2025-07
    event: 第七章：沈若微帮林昭宇做产品方向大调整。顾安安怀孕——她第一次展示不确定
  - date: 2025-09
    event: 第八章：台风天，深圳停工。林昭宇开车来接被困的沈若微。暴雨中交换了平时不说的真话
  - date: 2025-11
    event: 第九章：季凛再次联系——合作项目提名晋升。林昭宇拿到A轮后递出合伙人协议。母亲催婚电话——沈若微第一次正面回应

'2026':
  - date: 2026-01
    event: 第十章：沈若微做出最终选择——用自己的方式把两条线接在一起。科兴路烧烤摊上，赵恺举杯敬加班。她回了三条消息

factions:
  深圳科技园互联网圈: 科兴科学园/软件产业基地为核心的互联网产业集群，腾讯、字节、小鹏等大厂与新创公司并存，竞争白热化，35岁是职场暗线
  北京总部产品线: 沈若微所在公司的北京总部，对接大客户与政府关系，与深圳团队有微妙的"总部vs分支"张力
  投行/金融圈: 顾安安所在的圈子——高薪高压、快节奏、同龄人中最早结婚买房的一批人
  武汉家庭线: 沈若微的父母——武汉退休教师，传统观念，对独生女的婚恋有期待但方式克制
  创业小公司: 林昭宇的十人团队——AI客服赛道，现金流紧张、每个功能都在赌方向
